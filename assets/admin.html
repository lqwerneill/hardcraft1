<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | HandCraft</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">HANDCRAFT (ADMIN)</a>
            <div class="burger" id="burger">☰</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">На сайт</a></li>
                <li id="nav-auth"><a href="#" id="logout-btn">Выйти</a></li>
            </ul>
        </nav>
    </header>

    <main class="container fade-in">
        <h1>Панель управления</h1>
        
        <section style="margin-top:2rem;" class="admin-section">
            <h2>Управление товарами</h2>
            <div class="form-container" style="margin: 1rem 0;">
                <h3>Добавить/Редактировать товар</h3>
                <input type="hidden" id="prod-id">
                <input type="text" id="prod-name" placeholder="Название" style="width:100%; margin-bottom:10px;">
                <input type="text" id="prod-category" placeholder="Категория" style="width:100%; margin-bottom:10px;">
                <input type="text" id="prod-lead" placeholder="Краткий анонс" style="width:100%; margin-bottom:10px;">
                <input type="number" id="prod-price" placeholder="Цена" style="width:100%; margin-bottom:10px;">
                <input type="text" id="prod-img" placeholder="URL картинки" style="width:100%; margin-bottom:10px;">
                <input type="text" id="prod-material" placeholder="Материалы" style="width:100%; margin-bottom:10px;">
                <input type="text" id="prod-dimensions" placeholder="Размеры" style="width:100%; margin-bottom:10px;">
                <input type="text" id="prod-production" placeholder="Срок изготовления" style="width:100%; margin-bottom:10px;">
                <textarea id="prod-desc" placeholder="Описание" style="width:100%; margin-bottom:10px;"></textarea>
                <textarea id="prod-details" placeholder="Преимущества товара, каждое с новой строки" style="width:100%; margin-bottom:10px;"></textarea>
                <button class="btn admin-save-btn" id="admin-save-product">Сохранить</button>
            </div>
            <table>
                <thead>
                    <tr><th>ID</th><th>Название</th><th>Цена</th><th>Действия</th></tr>
                </thead>
                <tbody id="admin-products"></tbody>
            </table>
        </section>

        <section style="margin-top:2rem;" class="admin-section">
            <h2>Заказы клиентов</h2>
            <table>
                <thead>
                    <tr><th>ID Заказа</th><th>Клиент</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr>
                </thead>
                <tbody id="admin-orders"></tbody>
            </table>
        </section>

        <section style="margin-top:2rem;" class="admin-section">
            <h2>Отзывы клиентов</h2>
            <div class="form-container" style="margin: 1rem 0; max-width: 640px;">
                <h3>Редактировать отзыв</h3>
                <input type="hidden" id="review-id">
                <input type="text" id="review-name" placeholder="Имя клиента" style="width:100%; margin-bottom:10px;">
                <select id="review-rating" style="width:100%; margin-bottom:10px;">
                    <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                    <option value="4">⭐⭐⭐⭐ (4)</option>
                    <option value="3">⭐⭐⭐ (3)</option>
                    <option value="2">⭐⭐ (2)</option>
                    <option value="1">⭐ (1)</option>
                </select>
                <textarea id="review-text" placeholder="Текст отзыва" style="width:100%; margin-bottom:10px;"></textarea>
                <div class="table-actions">
                    <button class="btn admin-save-btn" id="admin-save-review">Сохранить отзыв</button>
                    <button class="btn btn-secondary btn-small" id="admin-reset-review">Очистить</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>ID</th><th>Клиент</th><th>Оценка</th><th>Отзыв</th><th>Действия</th></tr>
                </thead>
                <tbody id="admin-reviews"></tbody>
            </table>
        </section>
    </main>

    <script src="./scripts/main.js"></script>
</body>
</html>
